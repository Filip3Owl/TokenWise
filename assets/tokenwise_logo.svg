<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">

  <!-- Background -->
  <rect width="420" height="140" fill="#ffffff"/>

  <!-- Outer border -->
  <rect x="10" y="10" width="400" height="120" fill="none" stroke="#000000" stroke-width="3"/>

  <!-- Inner border (double line classic 90s) -->
  <rect x="16" y="16" width="388" height="108" fill="none" stroke="#000000" stroke-width="1"/>

  <!-- Icon block: filled square with T -->
  <rect x="30" y="32" width="72" height="72" fill="#000000"/>
  <text
    x="66" y="84"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="48" font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
  >T</text>

  <!-- Vertical separator -->
  <line x1="118" y1="28" x2="118" y2="112" stroke="#000000" stroke-width="2"/>

  <!-- Main title -->
  <text
    x="138" y="80"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="46" font-weight="900"
    fill="#000000"
    letter-spacing="-1"
  >TokenWise</text>

  <!-- Tagline -->
  <text
    x="138" y="104"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#000000"
    letter-spacing="2.5"
  >PROMPT TOKEN OPTIMIZER</text>

</svg>
