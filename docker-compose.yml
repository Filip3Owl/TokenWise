services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TOKENWISE_DB_PATH=/app/data/tokenwise.db
    volumes:
      # Persists the SQLite client database across container restarts
      - tokenwise_data:/app/data
    restart: unless-stopped

volumes:
  tokenwise_data:
